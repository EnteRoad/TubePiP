name: Build TubePiP IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        run: xcodegen generate --spec project.yml
        working-directory: ${{ github.workspace }}

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project TubePiP.xcodeproj \
            -scheme TubePiP \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/TubePiP.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Package IPA
        run: |
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$RUNNER_TEMP/TubePiP.xcarchive/Products/Applications/TubePiP.app" \
            "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          zip -r "$RUNNER_TEMP/TubePiP.ipa" Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TubePiP-unsigned
          path: ${{ runner.temp }}/TubePiP.ipa
          retention-days: 30
